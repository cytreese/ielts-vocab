<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Vocab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --ink: #1c1917;
    --paper: #f7f3ee;
    --surface: #fdfaf6;
    --accent: #b45309;
    --accent-light: #fef3c7;
    --muted: #78716c;
    --border: #e5e0d8;
    --green: #166534;
    --green-bg: #dcfce7;
    --red: #991b1b;
    --red-bg: #fee2e2;
    --blue: #1e40af;
    --blue-bg: #dbeafe;
    --orange: #c2410c;
    --orange-bg: #ffedd5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
    max-width: 680px;
    margin: 0 auto;
  }
  h1 { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
  /* Streak bar */
  .streak-bar {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 1.5rem;
  }
  .streak-fire { font-size: 22px; line-height: 1; }
  .streak-info { flex: 1; }
  .streak-num { font-size: 18px; font-weight: 600; color: var(--orange); line-height: 1; }
  .streak-lbl { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .streak-flips { font-size: 12px; color: var(--muted); text-align: right; }
  .streak-flips span { font-weight: 600; color: var(--ink); }
  /* Preview cards */
  .preview-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
  }
  .preview-word { font-family: 'Lora', serif; font-weight: 600; font-size: 18px; margin-bottom: 2px; }
  .preview-pos { font-size: 11px; background: var(--accent-light); padding: 1px 8px; border-radius: 99px; color: var(--accent); display: inline-block; margin-bottom: 8px; }
  .preview-original { font-size: 11px; color: var(--muted); margin-left: 6px; }
  .preview-zh { font-size: 15px; font-weight: 500; color: var(--ink); }
  .preview-en { font-size: 13px; color: var(--muted); line-height: 1.5; margin-top: 2px; }
  .preview-ex { font-family: 'Lora', serif; font-size: 13px; font-style: italic; color: var(--muted); line-height: 1.6; border-left: 2px solid var(--border); padding-left: 10px; margin-top: 8px; }
  /* Editable fields */
  [contenteditable] { outline: none; border-radius: 4px; padding: 1px 4px; margin: -1px -4px; transition: background 0.15s; cursor: text; }
  [contenteditable]:hover { background: var(--accent-light); }
  [contenteditable]:focus { background: var(--accent-light); box-shadow: 0 0 0 2px var(--accent); }
  .edit-hint { font-size: 10px; color: var(--muted); margin-top: 6px; opacity: 0.7; }
  .preview-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .preview-err { color: var(--red); font-size: 13px; }
  .preview-skip { color: var(--muted); font-size: 13px; font-style: italic; }
  /* Batch add */
  .batch-progress { margin-top: 12px; display: none; }
  .batch-progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
  .batch-progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s ease; width: 0%; }
  .batch-status { font-size: 12px; color: var(--muted); }
  .batch-result { margin-top: 10px; font-size: 12px; }
  .batch-result-item { padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; }
  .batch-result-item:last-child { border-bottom: none; }
  .batch-ok { color: var(--green); }
  .batch-skip { color: var(--muted); }
  .batch-err { color: var(--red); }
  /* API key */
  .apikey-section { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .apikey-row { display: flex; gap: 8px; align-items: center; }
  .apikey-input { flex: 1; padding: 7px 10px; font-size: 13px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--ink); outline: none; }
  .apikey-input:focus { border-color: var(--accent); }
  .apikey-status { font-size: 11px; margin-top: 5px; color: var(--muted); }
  .tabs { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; background: var(--surface); }
  .tab { flex: 1; padding: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; border: none; background: transparent; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .tab.active { background: var(--ink); color: #fff; }
  .view { display: none; }
  .view.active { display: block; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 500; color: var(--ink); }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s ease; width: 0%; }
  .card-area { margin-bottom: 1rem; }
  .card-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    cursor: pointer;
    min-height: 160px;
  }
  .front-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .card-word { font-family: 'Lora', serif; font-size: 36px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
  .card-pos { font-size: 12px; background: var(--accent-light); padding: 2px 10px; border-radius: 99px; color: var(--accent); display: inline-block; }
  .flip-hint { font-size: 12px; color: var(--muted); margin-top: 16px; }
  .back-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .def-zh { font-size: 20px; font-weight: 500; color: var(--ink); }
  .def-en { font-size: 15px; color: var(--muted); line-height: 1.6; margin-top: 3px; }
  .example-text { font-family: 'Lora', serif; font-size: 16px; font-style: italic; color: var(--muted); line-height: 1.6; border-left: 2px solid var(--border); padding-left: 10px; }
  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .pill { font-size: 13px; padding: 3px 11px; border-radius: 99px; border: 1px solid; }
  .pill-syn { background: var(--green-bg); color: var(--green); border-color: #86efac; }
  .pill-ant { background: var(--red-bg); color: var(--red); border-color: #fca5a5; }
  .action-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .rating-row { display: none; gap: 8px; margin-bottom: 1.5rem; }
  .rating-row.show { display: flex; }
  .rate-btn { flex: 1; padding: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--surface); color: var(--ink); transition: all 0.15s; }
  .rate-hard { color: var(--red); border-color: #fca5a5; }
  .rate-hard:hover { background: var(--red); color: #fff; border-color: var(--red); }
  .rate-ok { color: var(--accent); border-color: #fcd34d; }
  .rate-ok:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .rate-easy { color: var(--green); border-color: #86efac; }
  .rate-easy:hover { background: var(--green); color: #fff; border-color: var(--green); }
  .done-state { display: none; text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field textarea, .field select { width: 100%; padding: 8px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--ink); outline: none; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
  .field-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .btn { padding: 8px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: transparent; color: var(--ink); transition: all 0.15s; }
  .btn:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-primary:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .msg { font-size: 12px; margin-top: 8px; padding: 6px 10px; border-radius: 6px; }
  .msg-ok { background: var(--green-bg); color: var(--green); }
  .msg-err { background: var(--red-bg); color: var(--red); }
  .word-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .word-item:last-child { border-bottom: none; }
  .wi-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .wi-main { flex: 1; }
  .wi-word { font-family: 'Lora', serif; font-weight: 600; font-size: 15px; }
  .wi-def { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .wi-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .wi-pill { font-size: 11px; padding: 1px 7px; border-radius: 99px; border: 1px solid; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; flex-shrink: 0; margin-top: 2px; }
  .tag-new { background: var(--blue-bg); color: var(--blue); }
  .tag-hard { background: var(--red-bg); color: var(--red); }
  .tag-ok { background: var(--accent-light); color: var(--accent); }
  .tag-easy { background: var(--green-bg); color: var(--green); }
  .del-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--muted); padding: 0 4px; line-height: 1; flex-shrink: 0; }
  .del-btn:hover { color: var(--red); }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<h1>IELTS Vocab</h1>
<p class="subtitle" id="sub">你的個人單字本</p>
<!-- Streak Bar -->
<div class="streak-bar">
  <div class="streak-fire" id="streak-icon">✨</div>
  <div class="streak-info">
    <div class="streak-num" id="streak-num">0</div>
    <div class="streak-lbl">連續練習天數</div>
  </div>
  <div class="streak-flips">今日翻牌<br><span id="flips-today">0</span> 次</div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('study')">複習</button>
  <button class="tab" onclick="switchTab('add')">新增</button>
  <button class="tab" onclick="switchTab('list')">單字表</button>
</div>
<!-- STUDY -->
<div class="view active" id="view-study">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">total</div></div>
    <div class="stat"><div class="stat-num" id="s-due">0</div><div class="stat-lbl">due today</div></div>
    <div class="stat"><div class="stat-num" id="s-easy">0</div><div class="stat-lbl">mastered</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="done-state" id="done-state">✓ All done for today!<br><span style="font-size:12px;margin-top:6px;display:block;">Add more words or come back tomorrow.</span></div>
  <div class="card-area" id="card-area">
    <!-- front -->
    <div class="card-panel front-panel" id="panel-front" onclick="flipCard()">
      <div class="card-word" id="front-word"></div>
      <div class="card-pos" id="front-pos"></div>
      <div class="flip-hint">tap to reveal →</div>
    </div>
    <!-- back -->
    <div class="card-panel" id="panel-back" style="display:none; cursor:default;">
      <div class="back-label">意思</div>
      <div class="def-zh" id="back-zh"></div>
      <div class="def-en" id="back-en"></div>
      <div class="divider"></div>
      <div class="back-label">例句</div>
      <div class="example-text" id="back-ex"></div>
      <div id="syn-block">
        <div class="divider"></div>
        <div class="back-label">同義字 <span style="color:var(--green);">syn</span> · 反義字 <span style="color:var(--red);">ant</span></div>
        <div class="pill-row" id="back-pills"></div>
      </div>
    </div>
  </div>
  <div class="action-row" id="action-row">
    <button class="btn" id="flip-btn" style="font-size:12px;padding:5px 14px;" onclick="flipCard()">Reveal →</button>
  </div>
  <div class="rating-row" id="rating-row">
    <button class="rate-btn rate-hard" onclick="rate('hard')">😰 還不熟</button>
    <button class="rate-btn rate-ok" onclick="rate('ok')">🤔 大概懂</button>
    <button class="rate-btn rate-easy" onclick="rate('easy')">✓ 記住了</button>
  </div>
</div>
<!-- ADD -->
<div class="view" id="view-add">
  <!-- Step 1: Input -->
  <div id="add-step1">
    <div class="field">
      <label>輸入單字（一行一個，可輸入變化形如 derives、running）</label>
      <textarea id="inp-words" rows="5" placeholder="proliferate&#10;derives&#10;undermining&#10;..."></textarea>
      <div class="field-hint">AI 會自動還原為字典原型・重複的字會自動略過</div>
    </div>
    <button class="btn btn-primary" id="btn-generate" onclick="generatePreview()">✨ AI 產出</button>
    <div class="batch-progress" id="batch-progress" style="display:none;">
      <div class="batch-progress-bar"><div class="batch-progress-fill" id="batch-fill"></div></div>
      <div class="batch-status" id="batch-status"></div>
    </div>
  </div>
  <!-- Step 2: Preview -->
  <div id="add-step2" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-size:13px;color:var(--muted);" id="preview-count"></span>
      <button class="btn" onclick="backToInput()" style="font-size:12px;padding:4px 12px;">← 重新輸入</button>
    </div>
    <div id="preview-list"></div>
    <div style="margin-top:1rem;display:flex;gap:8px;">
      <button class="btn btn-primary" onclick="confirmAdd()" id="btn-confirm">＋ 全部加入單字表</button>
    </div>
    <div id="add-msg" style="margin-top:8px;"></div>
  </div>
</div>
<!-- LIST -->
<div class="view" id="view-list">
  <div id="word-list"></div>
</div>
<script>
const STORE = 'ielts_vocab_v3';
const SESSION_STORE = 'ielts_session_v1';
const STREAK_STORE = 'ielts_streak_v1';
const APIKEY_STORE = 'ielts_apikey_v1';
const TODAY = new Date().toDateString();
// ── API Key ──────────────────────────────────────────────
function getApiKey() { return localStorage.getItem(APIKEY_STORE) || ''; }
function saveApiKey() {
  const key = document.getElementById('inp-apikey').value.trim();
  if (!key) { setApiKeyStatus('請輸入 API Key', true); return; }
  localStorage.setItem(APIKEY_STORE, key);
  document.getElementById('inp-apikey').value = '';
  setApiKeyStatus('✓ 已儲存', false);
}
function setApiKeyStatus(msg, isErr) {
  const el = document.getElementById('apikey-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isErr ? 'var(--red)' : 'var(--green)';
}
function initApiKeyUI() {
  const key = getApiKey();
  setApiKeyStatus(key ? '✓ API Key 已設定' : '尚未設定，AI 補齊功能無法使用', !key);
}
// ── Streak ───────────────────────────────────────────────
function loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_STORE)) || {}; } catch(e) { return {}; }
}
function saveStreak(s) { try { localStorage.setItem(STREAK_STORE, JSON.stringify(s)); } catch(e) {} }
function getStreakData() {
  const s = loadStreak();
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yStr = yesterday.toDateString();
  if (s.lastDay === TODAY) { /* already updated */ }
  else if (s.lastDay === yStr) { s.streak=(s.streak||0)+1; s.lastDay=TODAY; s.flipsToday=0; saveStreak(s); }
  else { s.streak=1; s.lastDay=TODAY; s.flipsToday=0; saveStreak(s); }
  return s;
}
function recordFlip() {
  const s=loadStreak(); s.flipsToday=(s.flipsToday||0)+1; saveStreak(s); updateStreakUI();
}
function updateStreakUI() {
  const s=loadStreak(); const streak=s.streak||0;
  document.getElementById('streak-num').textContent=streak;
  document.getElementById('flips-today').textContent=s.flipsToday||0;
  document.getElementById('streak-icon').textContent=streak>=7?'🔥':streak>=3?'⚡':'✨';
}
// ── Session ──────────────────────────────────────────────
function saveSession() {
  try { localStorage.setItem(SESSION_STORE, JSON.stringify({date:TODAY,queueIds:queue.map(w=>w.id),idx,done})); } catch(e) {}
}
function loadSession() {
  try { const s=JSON.parse(localStorage.getItem(SESSION_STORE)||'null'); return s&&s.date===TODAY?s:null; } catch(e){return null;}
}
function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}
// ── Batch add with preview ───────────────────────────────
let pendingWords = [];
const PROXY_URL = 'https://ielts-proxy.cytreese.workers.dev';

async function fetchWordData(word) {
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 1000,
      // ── CHANGE 1: ask AI to (a) return the base/dictionary form and (b) use Taiwan Traditional Chinese ──
      system: 'LANGUAGE RULE — THIS IS MANDATORY AND OVERRIDES EVERYTHING ELSE: The "zh" field MUST be written in Traditional Chinese characters (繁體中文) as used in Taiwan. NEVER output Simplified Chinese characters (简体字). Wrong: 强调、发展、处理、经济、学习. Correct: 強調、發展、處理、經濟、學習. When in doubt, always choose the Traditional Chinese form.\n\nYou are an IELTS vocabulary expert. The user may give you an inflected word (e.g. "derives", "running", "undermined"). Respond ONLY with a JSON object (no markdown, no backticks, no extra text) with these exact keys: word (the base/dictionary form of the input, e.g. "derive" for "derives", "run" for "running"), zh (Traditional Chinese used in Taiwan — 台灣繁體中文，絕對禁止簡體字，≤8字), en (English definition, 1 sentence), ex (IELTS academic example sentence using the base form, 20-30 words), syn (array of 2-4 synonyms commonly used in IELTS reading passages), ant (array of 1-3 antonyms, or empty array if none relevant), pos (part of speech: one of v. / adj. / n. / adv. / phr.).',
      messages: [{ role: 'user', content: word }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'API error');
  if (!data.content || !data.content[0]) throw new Error('Empty response');
  const text = data.content[0].text.trim().replace(/^```json|^```|```$/gm, '').trim();
  const parsed = JSON.parse(text);
  if (!parsed.zh) throw new Error('Invalid JSON structure');
  return parsed;
}

function renderPreviewCard(item, idx) {
  if (item.skipped) {
    const skipNote = item.normalizedTo
      ? `已在單字表中（原型：${item.normalizedTo}），略過`
      : '已在單字表中，略過';
    return `<div class="preview-card">
      <div class="preview-word">${item.inputWord}${item.normalizedTo && item.normalizedTo !== item.inputWord ? ` <span class="preview-original">→ ${item.normalizedTo}</span>` : ''}</div>
      <div class="preview-skip">${skipNote}</div>
    </div>`;
  }
  if (item.error) return `<div class="preview-card"><div class="preview-word">${item.inputWord}</div><div class="preview-err">✗ AI 無法產出，將略過</div></div>`;
  const synHtml = (item.syn||[]).map(s=>`<span class="pill pill-syn">≈ ${s}</span>`).join('');
  const antHtml = (item.ant||[]).map(a=>`<span class="pill pill-ant">↔ ${a}</span>`).join('');
  const normHint = (item.word !== item.inputWord)
    ? `<span class="preview-original">（輸入：${item.inputWord}）</span>`
    : '';
  return `<div class="preview-card">
    <div class="preview-word">
      <span contenteditable="true"
            oninput="updatePending(${idx},'word',this.textContent)"
            title="點擊可編輯單字原型">${item.word}</span>
      ${normHint}<span class="preview-pos">${item.pos||''}</span>
    </div>
    <div class="preview-zh"
         contenteditable="true"
         oninput="updatePending(${idx},'zh',this.textContent)"
         title="點擊可編輯中文翻譯">${item.zh||''}</div>
    <div class="preview-en">${item.en||''}</div>
    <div class="preview-ex">"${item.ex||''}"</div>
    ${(synHtml||antHtml)?`<div class="preview-pills">${synHtml}${antHtml}</div>`:''}
    <div class="edit-hint">✏️ 點擊單字或中文翻譯可直接修改</div>
  </div>`;
}

function updatePending(idx, field, value) {
  if (pendingWords[idx]) pendingWords[idx][field] = value.trim();
}

async function generatePreview() {
  const apiKey = getApiKey();
  if (!apiKey) { alert('請先設定 Anthropic API Key'); return; }
  const raw = document.getElementById('inp-words').value;
  const inputWords = raw.split('\n').map(w=>w.trim()).filter(Boolean);
  if (!inputWords.length) { alert('請輸入至少一個單字'); return; }
  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  const prog = document.getElementById('batch-progress');
  const fill = document.getElementById('batch-fill');
  const status = document.getElementById('batch-status');
  prog.style.display = 'block';

  // ── CHANGE 2: track both original words AND base forms already seen this batch ──
  const existingInVocab = new Set(words.map(w=>w.word.toLowerCase()));
  const addedThisBatch = new Set(); // prevent duplicates within the same batch run

  pendingWords = [];
  for (let i = 0; i < inputWords.length; i++) {
    const inputWord = inputWords[i];
    fill.style.width = Math.round(((i) / inputWords.length) * 100) + '%';
    status.textContent = `AI 產出中 ${i+1} / ${inputWords.length}：${inputWord}`;

    // Quick pre-check: if the user typed exactly a word already in vocab, skip without API call
    if (existingInVocab.has(inputWord.toLowerCase())) {
      pendingWords.push({ inputWord, word: inputWord, skipped: true });
      continue;
    }

    try {
      const d = await fetchWordData(inputWord);
      // ── Use the AI-returned base form as the canonical word ──
      const baseWord = (d.word || inputWord).toLowerCase().trim();
      const displayWord = d.word || inputWord;

      // Post-fetch duplicate check: base form may already exist in vocab or this batch
      if (existingInVocab.has(baseWord) || addedThisBatch.has(baseWord)) {
        pendingWords.push({ inputWord, word: displayWord, normalizedTo: displayWord, skipped: true });
      } else {
        addedThisBatch.add(baseWord);
        pendingWords.push({
          inputWord,                      // what the user originally typed
          word: displayWord,              // base / dictionary form from AI
          pos: d.pos || 'n.',
          zh: d.zh || '',
          en: d.en || '',
          ex: d.ex || '',
          syn: d.syn || [],
          ant: d.ant || []
        });
      }
    } catch(e) {
      pendingWords.push({ inputWord, word: inputWord, error: true });
    }
  }
  fill.style.width = '100%';
  btn.disabled = false;
  prog.style.display = 'none';

  // Show preview
  const validCount = pendingWords.filter(w=>!w.skipped&&!w.error).length;
  const skippedCount = pendingWords.filter(w=>w.skipped).length;
  document.getElementById('preview-count').textContent =
    `${validCount} 個新單字` + (skippedCount ? `，${skippedCount} 個略過` : '');
  document.getElementById('preview-list').innerHTML = pendingWords.map((item, i) => renderPreviewCard(item, i)).join('');
  document.getElementById('add-step1').style.display = 'none';
  document.getElementById('add-step2').style.display = 'block';
}

function backToInput() {
  document.getElementById('add-step1').style.display = 'block';
  document.getElementById('add-step2').style.display = 'none';
  pendingWords = [];
}

function confirmAdd() {
  const toAdd = pendingWords.filter(w=>!w.skipped&&!w.error);
  toAdd.forEach(item => {
    words.push({
      id: getNextId(),
      word: item.word,       // base form
      pos: item.pos,
      zh: item.zh,
      en: item.en,
      ex: item.ex,
      syn: item.syn,
      ant: item.ant,
      status: 'new',
      next: Date.now()
    });
  });
  save(); updateStats();
  const msg = document.getElementById('add-msg');
  msg.textContent = `✓ 已加入 ${toAdd.length} 個單字！`;
  msg.style.color = 'var(--green)';
  document.getElementById('inp-words').value = '';
  pendingWords = [];
  setTimeout(() => {
    backToInput();
    msg.textContent = '';
  }, 1500);
}

let words = [], queue = [], idx = 0, done = 0, flipped = false;
function load() {
  try {
    const raw = localStorage.getItem(STORE);
    if (raw) { words = JSON.parse(raw); words.forEach(w => { if(!w.syn) w.syn=[]; if(!w.ant) w.ant=[]; }); }
    else words = DEFAULTS;
  } catch(e) { words = DEFAULTS; }
}
function save() { try { localStorage.setItem(STORE, JSON.stringify(words)); } catch(e) {} }
function getNextId() { return words.length ? Math.max(...words.map(w=>w.id))+1 : 1; }
function getDue() { return words.filter(w => w.next <= Date.now()); }
function updateStats() {
  document.getElementById('s-total').textContent = words.length;
  document.getElementById('s-due').textContent = getDue().length;
  document.getElementById('s-easy').textContent = words.filter(w=>w.status==='easy').length;
}
function initStudy() {
  flipped=false; getStreakData(); updateStreakUI();
  const session=loadSession(); const due=getDue();
  if (session&&session.queueIds) {
    const idMap=Object.fromEntries(words.map(w=>[w.id,w]));
    const restored=session.queueIds.map(id=>idMap[id]).filter(Boolean);
    const seen=new Set(session.queueIds);
    queue=[...restored,...shuffle(due.filter(w=>!seen.has(w.id)))];
    idx=session.idx; done=session.done;
  } else {
    const pri=(w)=>w.status==='hard'?0:w.status==='new'?1:2;
    queue=[0,1,2].flatMap(p=>shuffle(due.filter(w=>pri(w)===p)));
    idx=0; done=0; saveSession();
  }
  updateStats(); showCard();
}
function showCard() {
  const total = queue.length + done;
  document.getElementById('prog').style.width = total ? Math.round((done/total)*100)+'%' : '0%';
  if (idx >= queue.length) {
    document.getElementById('card-area').style.display = 'none';
    document.getElementById('action-row').style.display = 'none';
    document.getElementById('rating-row').classList.remove('show');
    document.getElementById('done-state').style.display = 'block';
    document.getElementById('prog').style.width = '100%';
    return;
  }
  document.getElementById('card-area').style.display = 'block';
  document.getElementById('action-row').style.display = 'flex';
  document.getElementById('done-state').style.display = 'none';
  const w = queue[idx];
  document.getElementById('front-word').textContent = w.word;
  document.getElementById('front-pos').textContent = w.pos;
  document.getElementById('back-zh').textContent = w.zh;
  document.getElementById('back-en').textContent = w.en;
  document.getElementById('back-ex').textContent = '"' + w.ex + '"';
  const hasPills = (w.syn && w.syn.length) || (w.ant && w.ant.length);
  document.getElementById('syn-block').style.display = hasPills ? 'block' : 'none';
  const pillRow = document.getElementById('back-pills');
  pillRow.innerHTML = '';
  (w.syn||[]).forEach(s => { const p = document.createElement('span'); p.className='pill pill-syn'; p.textContent='≈ '+s; pillRow.appendChild(p); });
  (w.ant||[]).forEach(a => { const p = document.createElement('span'); p.className='pill pill-ant'; p.textContent='↔ '+a; pillRow.appendChild(p); });
  document.getElementById('panel-front').style.display = 'flex';
  document.getElementById('panel-back').style.display = 'none';
  document.getElementById('rating-row').classList.remove('show');
  const fb = document.getElementById('flip-btn');
  fb.textContent = 'Reveal →';
  fb.disabled = false;
  flipped = false;
}
function flipCard() {
  if (flipped) return;
  flipped = true;
  recordFlip();
  document.getElementById('panel-front').style.display = 'none';
  document.getElementById('panel-back').style.display = 'block';
  document.getElementById('rating-row').classList.add('show');
  const fb = document.getElementById('flip-btn');
  fb.textContent = '已翻面';
  fb.disabled = true;
}
function rate(r) {
  const w = queue[idx];
  const wi = words.findIndex(x => x.id === w.id);
  if (wi === -1) return;
  words[wi].status = r;
  const day = 86400000;
  words[wi].next = Date.now() + ({hard:day, ok:3*day, easy:7*day})[r];
  save(); done++; idx++;
  saveSession();
  updateStats(); showCard();
}
function renderList() {
  const el = document.getElementById('word-list');
  if (!words.length) { el.innerHTML='<div class="empty">還沒有單字，去「新增」加入吧！</div>'; return; }
  const tagMap = { new:['tag-new','new'], hard:['tag-hard','hard'], ok:['tag-ok','ok'], easy:['tag-easy','easy'] };
  el.innerHTML = words.map(w => {
    const [cls, lbl] = tagMap[w.status] || tagMap.new;
    const synHtml = (w.syn||[]).map(s=>`<span class="wi-pill pill-syn" style="background:var(--green-bg);color:var(--green);border-color:#86efac;">≈ ${s}</span>`).join('');
    const antHtml = (w.ant||[]).map(a=>`<span class="wi-pill pill-ant" style="background:var(--red-bg);color:var(--red);border-color:#fca5a5;">↔ ${a}</span>`).join('');
    return `<div class="word-item">
      <div class="wi-top">
        <div class="wi-main">
          <div class="wi-word">${w.word} <span style="font-size:11px;color:var(--muted);font-weight:400;">${w.pos}</span></div>
          <div class="wi-def">${w.zh}</div>
        </div>
        <span class="tag ${cls}">${lbl}</span>
        <button class="del-btn" onclick="delWord(${w.id})" title="刪除">×</button>
      </div>
      ${(synHtml||antHtml)?`<div class="wi-pills">${synHtml}${antHtml}</div>`:''}
    </div>`;
  }).join('');
}
function delWord(id) {
  if (!confirm('確定刪除這個字？')) return;
  words = words.filter(w=>w.id!==id);
  save(); renderList(); updateStats();
}
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['study','add','list'][i]===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if (name==='list') renderList();
  if (name==='study') initStudy();
}
load();
initStudy();
document.getElementById('sub').textContent = `${words.length} 個單字 · ${getDue().length} 個待複習`;
</script>
